version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: meraki_database
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meraki_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meraki_secure_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-meraki_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meraki_backend
    command: sh -c "alembic upgrade head && PYTHONPATH=. python app/scripts/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-meraki_user}:${POSTGRES_PASSWORD:-meraki_secure_password_2026}@database:5432/${POSTGRES_DB:-meraki_db}
      - DATABASE_SYNC_URL=postgresql+psycopg2://${POSTGRES_USER:-meraki_user}:${POSTGRES_PASSWORD:-meraki_secure_password_2026}@database:5432/${POSTGRES_DB:-meraki_db}
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_for_jwt_token_generation_expo_360_meraki_2026_design}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-expo360.meraki@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin_meraki_2026!}
      - EVENT_NAME=${EVENT_NAME:-Expo 360 Meraki}
      - EVENT_ORGANIZER=${EVENT_ORGANIZER:-Carrera de Diseño Gráfico}
      - EVENT_CONTACT_EMAIL=${EVENT_CONTACT_EMAIL:-expo360.meraki@gmail.com}
      - EVENT_DATE=${EVENT_DATE:-2026-08-16}
      - EVENT_START_TIME=${EVENT_START_TIME:-10:00:00}
      - EVENT_END_TIME=${EVENT_END_TIME:-18:00:00}
      - EVENT_LOCATION=${EVENT_LOCATION:-Centro de Convenciones, Salón de Exposiciones}
      - EVENT_MAX_PARTICIPANTS=${EVENT_MAX_PARTICIPANTS:-200}
      - EVENT_REGISTRATION_DEADLINE=${EVENT_REGISTRATION_DEADLINE:-2026-08-15T23:59:59}
      - EVENT_STATUS=${EVENT_STATUS:-active}
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: meraki_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
